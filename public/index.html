<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6-Digit Code Verification</title>

<style>
  body {
    font-family: "Inter", sans-serif;
    background: #0f0f0f;
    color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .verify-box {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 30px 40px;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    width: 300px;
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
  }

  .fake-input {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    letter-spacing: 15px;
    position: relative;
    font-size: 24px;
  }

  .fake-input::before {
    content: attr(data-value);
    display: flex;
    width: 100%;
    justify-content: space-between;
    color: #fff;
    letter-spacing: 15px;
  }

  .code-box {
    position: relative;
    display: inline-block;
    width: 100%;
  }

  .code-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .boxes {
    display: flex;
    justify-content: space-between;
  }

  .box {
    width: 40px;
    height: 50px;
    border-radius: 8px;
    border: 2px solid #555;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    transition: border-color 0.2s;
  }

  .box.active {
    border-color: #00bfff;
  }

  button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: #00bfff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    color: #fff;
    cursor: pointer;
  }

  button:hover {
    background: #0099cc;
  }
</style>
</head>
<body>
  <div class="verify-box">
    <div class="code-box">
      <div class="boxes" id="boxes">
        <div class="box active"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </div>
      <input type="text" maxlength="6" class="code-input" id="codeInput" autofocus>
    </div>

<script>
  const input = document.getElementById("codeInput");
  const boxes = document.querySelectorAll(".box");

  // update visual boxes when typing
  input.addEventListener("input", () => {
    const value = input.value.replace(/\D/g, "").slice(0, 6);
    input.value = value;
    boxes.forEach((box, index) => {
      box.textContent = value[index] || "";
      box.classList.toggle("active", index === value.length);
    });
  });

  // handle backspace key visually
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") {
      boxes.forEach((box, index) => {
        if (index >= input.value.length - 1) {
          box.textContent = "";
        }
      });
    }
  });

  // focus entire hidden input when user clicks anywhere
  document.getElementById("boxes").addEventListener("click", () => input.focus());

  document.getElementById("verifyBtn").addEventListener("click", () => {
    alert("Entered code: " + input.value);
  });
</script>
</body>
</html>
